<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro - Pesos Fijos</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #eeeeee;
            --primary: #00d1b2;
            --color-abs: #4a5568; 
            --color-piernas: #2d6a4f;
            --color-especifico: #2b6cb0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { color: var(--primary); font-size: 1.2rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .btn-reset-top {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .selector-dias {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #222;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 10px;
            font-weight: bold;
            flex: 1;
            border-radius: 8px;
        }

        .tab-btn.active { background: var(--primary); color: #000; }

        .dia-contenedor { display: none; background: #111; border-radius: 20px; padding: 15px; border: 1px solid #333; }
        .dia-contenedor.active { display: block; }

        .dia-header { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; }

        .etapa-header {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        .etapa-abs { background: var(--color-abs); }
        .etapa-piernas { background: var(--color-piernas); }
        .etapa-foco { background: var(--color-especifico); }

        .ejercicio {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .bloque-abs .ejercicio { border-left: 4px solid var(--color-abs); }
        .bloque-piernas .ejercicio { border-left: 4px solid var(--color-piernas); }
        .bloque-foco .ejercicio { border-left: 4px solid var(--color-especifico); }

        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--primary); }

        .info { flex-grow: 1; }
        .nom { font-weight: bold; font-size: 1rem; display: block; color: #fff; }
        .det { color: #888; font-size: 0.85rem; }

        .input-peso {
            background: #333;
            border: 1px solid #444;
            color: #ffdd57;
            font-weight: bold;
            width: 55px;
            text-align: center;
            border-radius: 5px;
            padding: 4px;
            font-size: 0.9rem;
        }

        #clock-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            padding: 10px 30px;
            border-radius: 40px;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        #clock-display { font-family: monospace; font-size: 1.8rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

        <button class="btn-reset-top" onclick="clearChecks()">🔄 LIMPIAR DÍA</button>
    </div>

    <div class="selector-dias">
        <button class="tab-btn active" onclick="abrirDia('lunes', this)">LUN</button>
        <button class="tab-btn" onclick="abrirDia('miercoles', this)">MIE</button>
        <button class="tab-btn" onclick="abrirDia('viernes', this)">VIE</button>
    </div>
