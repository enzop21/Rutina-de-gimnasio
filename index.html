<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro - Bloques</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #eeeeee;
            --primary: #00d1b2;
            /* Colores de Bloques */
            --color-abs: #4a5568; 
            --color-piernas: #2d6a4f;
            --color-especifico: #2b6cb0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 110px;
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin-bottom: 25px; }

        .dia-contenedor {
            background: #111;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .dia-header {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        .etapa-header {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 8px;
            display: inline-block;
            text-transform: uppercase;
        }

        /* Distintivos por etapa */
        .etapa-abs { background: var(--color-abs); color: white; }
        .etapa-piernas { background: var(--color-piernas); color: white; }
        .etapa-foco { background: var(--color-especifico); color: white; }

        .ejercicio {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border-left: 4px solid rgba(255,255,255,0.1);
        }

        /* Bordes sutiles según la etapa para reforzar el color */
        .bloque-abs .ejercicio { border-left-color: var(--color-abs); }
        .bloque-piernas .ejercicio { border-left-color: var(--color-piernas); }
        .bloque-foco .ejercicio { border-left-color: var(--color-especifico); }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: var(--primary);
        }

        .info { flex-grow: 1; }
        .nom { font-weight: bold; font-size: 1rem; display: block; }
        .det { color: #888; font-size: 0.85rem; }
        .peso { color: #ffdd57; font-weight: bold; }

        /* Timer */
        #timer-box {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid var(--primary);
            width: 85%;
            max-width: 300px;
            justify-content: space-between;
        }

        #time { font-family: monospace; font-size: 1.6rem; color: var(--primary); }
        .btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚀 RUTINA SEMANAL</h1>

    <div class="dia-contenedor">
        <div class="dia-header">Lunes: Piernas + Espalda</div>
        
        <div class="bloque-abs">
            <div class="etapa-header etapa-abs">Etapa 1: Abdominales</div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Crunch Abdominal</span><div class="det">3 x 20</div></div></div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Plancha Isométrica</span><div class="det">3 x 45 seg</div></div></div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Elevación de Piernas</span><div class="det">3 x 15</div></div></div>
        </div>

        <div class="bloque-piernas">
            <div class="etapa-header etapa-piernas">Etapa 2: Piernas</div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Sentadillas</span><div class="det">4 x 10 | <span class="peso">--kg</span></div></div></div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Prensa</span><div class="det">3 x 12 | <span class="peso">--kg</span></div></div></div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Sillón de Cuádriceps</span><div class="det">3 x 15 | <span class="peso">--kg</span></div></div></div>
        </div>

        <div class="bloque-foco">
            <div class="etapa-header etapa-foco">Etapa 3: Espalda</div>
            <div class="ejercicio"><input type="checkbox"><div class="info"><span class="nom">Tirón al Pecho</span>
