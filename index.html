<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro - Visual</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #eeeeee;
            --primary: #00d1b2;
            --color-abs: #4a5568; 
            --color-piernas: #2d6a4f;
            --color-especifico: #2b6cb0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
        }

        .header-container { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); font-size: 1.3rem; margin: 0; text-transform: uppercase; }

        .selector-dias {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #222;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            background: none; border: none; color: #888;
            padding: 10px; font-weight: bold; flex: 1; border-radius: 8px;
        }

        .tab-btn.active { background: var(--primary); color: #000; }

        .dia-contenedor { display: none; background: #111; border-radius: 20px; padding: 15px; border: 1px solid #333; }
        .dia-contenedor.active { display: block; }

        .dia-header { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; }

        .etapa-header {
            padding: 6px 12px; border-radius: 8px; font-size: 0.8rem;
            font-weight: bold; margin-top: 15px; margin-bottom: 10px;
            display: block; text-transform: uppercase;
        }

        .etapa-abs { background: var(--color-abs); }

        /* Estilo para los ejercicios con imagen */
        .ejercicio {
            background: var(--card);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border-left: 4px solid transparent;
        }

        .bloque-abs .ejercicio { border-left-color: var(--color-abs); }

        .img-guia {
            width: 70px;
            height: 50px;
            background-color: #fff;
            border-radius: 6px;
            margin-right: 12px;
            object-fit: contain;
            border: 1px solid #444;
        }

        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; accent-color: var(--primary); }

        .info { flex-grow: 1; min-width: 0; }
        .nom { font-weight: bold; font-size: 0.9rem; display: block; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .det { color: #888; font-size: 0.75rem; }

        .btn-random {
            background: #333;
            border: none;
            color: var(--primary);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-left: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #clock-box {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: #1a1a1a;
            padding: 8px 25px; border-radius: 40px;
            border: 2px solid var(--primary); z-index: 1000;
        }

        #clock-display { font-family: monospace; font-size: 1.5rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🏋️ MI RUTINA PRO</h1>
    </div>

    <div class="selector-dias">
        <button class="tab-btn active" onclick="abrirDia('lunes', this)">LUN</button>
        <button class="tab-btn" onclick="abrirDia('miercoles', this)">MIE</button>
        <button class="tab-btn" onclick="abrirDia('viernes', this)">VIE</button>
    </div>

    <div id="lunes" class="dia-contenedor active">
        <div class="dia-header">Piernas + Espalda</div>
        <div class="bloque-abs" id="abs-lunes">
            <span class="etapa-header etapa-abs">Etapa 1: Abdominales</span>
        </div>
    </div>

    <div id="miercoles" class="dia-contenedor">
        <div class="dia-header">Piernas + Pecho</div>
        <div class="bloque-abs" id="abs-miercoles">
            <span class="etapa-header etapa-abs">Etapa 1: Abdominales</span>
        </div>
    </div>

    <div id="viernes" class="dia-contenedor">
        <div class="dia-header">Piernas + Brazos</div>
        <div class="bloque-abs" id="abs-viernes">
            <span class="etapa-header etapa-abs">Etapa 1: Abdominales</span>
        </div>
    </div>

    <div id="clock-box"><div id="clock-display">00:00:00</div></div>

    <script>
        // BASE DE DATOS CON "PLACEMARKS" DE IMAGEN (Simulando recortes de tu tabla)
        // Nota: En un entorno real, usarías URLs de las imágenes recortadas.
        const dbAbs = {
            estabilidad: [
                { nom: "Plank", det: "3 x 45s", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Plank" },
                { nom: "Dead Bug", det: "3 x 15", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Dead+Bug" },
                { nom: "Rueda Abd.", det: "3 x 10", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Ab+Wheel" }
            ],
            fuerza: [
                { nom: "Elev. Piernas", det: "3 x 12", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Leg+Raise" },
                { nom: "Crunch 90°", det: "3 x 15", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Crunch+90" },
                { nom: "Crunch Disco", det: "3 x 15", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Crunch+Disco" }
            ],
            intensidad: [
                { nom: "Mt. Climbers", det: "3 x 40s", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Climbers" },
                { nom: "V-Ups", det: "3 x 12", img: "https://via.placeholder.com/150/FFFFFF/000000?text=V-Ups" },
                { nom: "Russian Twist", det: "3 x 20", img: "https://via.placeholder.com/150/FFFFFF/000000?text=Twists" }
            ]
        };

        function getAleatorio(tipo) {
            const lista = dbAbs[tipo];
            return lista[Math.floor(Math.random() * lista.length)];
        }

        function crearHtmlEjercicio(tipo, dia) {
            const ej = getAleatorio(tipo);
            const idUnico = `abs-${dia}-${tipo}`;
            return `
                <div class="ejercicio" id="cont-${idUnico}">
                    <input type="checkbox" id="check-${idUnico}">
                    <img src="${ej.img}" class="img-guia" id="img-${idUnico}">
                    <div class="info">
                        <span class="nom" id="nom-${idUnico}">${ej.nom}</span>
                        <div class="det" id="det-${idUnico}">${ej.det}</div>
                    </div>
                    <button class="btn-random" onclick="cambiarEjercicio('${tipo}', '${idUnico}')">🔄</button>
                </div>`;
        }

        function cambiarEjercicio(tipo, idUnico) {
            const nuevo = getAleatorio(tipo);
            document.getElementById(`nom-${idUnico}`).innerText = nuevo.nom;
            document.getElementById(`det-${idUnico}`).innerText = nuevo.det;
            document.getElementById(`img-${idUnico}`).src = nuevo.img;
            document.getElementById(`check-${idUnico}`).checked = false;
        }

        function inicializarAbs() {
            ['lunes', 'miercoles', 'viernes'].forEach(dia => {
                const contenedor = document.getElementById(`abs-${dia}`);
                contenedor.innerHTML += crearHtmlEjercicio('estabilidad', dia);
                contenedor.innerHTML += crearHtmlEjercicio('fuerza', dia);
                contenedor.innerHTML += crearHtmlEjercicio('intensidad', dia);
            });
        }

        function updateClock() {
            document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('es-AR', {hour12:false});
        }
        setInterval(updateClock, 1000); updateClock();

        function abrirDia(diaId, btn) {
            document.querySelectorAll('.dia-contenedor').forEach(cont => cont.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(diaId).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = inicializarAbs;
    </script>
</body>
</html>
