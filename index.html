<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rutina de Entrenamiento</title>
    <style>
        :root {
            --primary: #00d1b2;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #ffdd57;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px; /* Espacio para el cronómetro flotante */
        }

        h1 { text-align: center; color: var(--primary); font-size: 1.6rem; margin-bottom: 30px; }
        
        .dia-seccion { margin-bottom: 40px; }
        
        .dia-titulo {
            background: var(--primary);
            color: #000;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .ejercicio {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 5px solid var(--primary);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            accent-color: var(--primary);
        }

        .info-ejercicio { flex-grow: 1; }
        .nombre { font-weight: bold; display: block; font-size: 1.1rem; }
        .detalles { color: #888; font-size: 0.9rem; margin-top: 3px; }
        .peso { color: var(--accent); font-weight: bold; }

        /* Cronómetro Flotante */
        #timer-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--primary);
            z-index: 1000;
        }

        #timer-display {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            min-width: 60px;
        }

        .btn-timer {
            background: var(--primary);
            border: none;
            color: black;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>💪 ENTRENAMIENTO</h1>

    <div class="dia-seccion">
        <div class="dia-titulo">Lunes: Pecho y Tríceps</div>
        
        <div class="ejercicio">
            <input type="checkbox">
            <div class="info-ejercicio">
                <span class="nombre">Press de Banca</span>
                <div class="detalles">4 series x 10 reps | <span class="peso">60 kg</span></div>
            </div>
        </div>

        <div class="ejercicio">
            <input type="checkbox">
            <div class="info-ejercicio">
                <span class="nombre">Aperturas con Mancuernas</span>
                <div class="detalles">3 series x 12 reps | <span class="peso">12 kg</span></div>
            </div>
        </div>
    </div>

    <div class="dia-seccion">
        <div class="dia-titulo">Miércoles: Espalda y Bíceps</div>
        
        <div class="ejercicio">
            <input type="checkbox">
            <div class="info-ejercicio">
                <span class="nombre">Remo con Barra</span>
                <div class="detalles">4 series x 10 reps | <span class="peso">50 kg</span></div>
            </div>
        </div>
    </div>

    <div id="timer-container">
        <div id="timer-display">01:00</div>
        <button class="btn-timer" onclick="toggleTimer()" id="btn-label">INICIAR</button>
        <button class="btn-timer" style="background: #444; color: white;" onclick="resetTimer()">R</button>
    </div>

    <script>
        let timeLeft = 60;
        let timerId = null;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
                document.getElementById('btn-label').innerText = "CONTINUAR";
            } else {
                document.getElementById('btn-label').innerText = "PAUSA";
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        alert("¡Tiempo cumplido! A la siguiente serie.");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 60;
            updateDisplay();
            document.getElementById('btn-label').innerText = "INICIAR";
        }
    </script>

</body>
</html>
