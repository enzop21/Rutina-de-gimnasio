<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro - Guía Flotante</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #eeeeee;
            --primary: #00d1b2;
            --color-abs: #4a5568; 
            --color-piernas: #2d6a4f;
            --color-especifico: #2b6cb0;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
        }

        .header-container { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); font-size: 1.3rem; margin: 0; text-transform: uppercase; }

        .selector-dias {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #222;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            background: none; border: none; color: #888;
            padding: 10px; font-weight: bold; flex: 1; border-radius: 8px;
        }

        .tab-btn.active { background: var(--primary); color: #000; }

        .dia-contenedor { display: none; background: #111; border-radius: 20px; padding: 15px; border: 1px solid #333; }
        .dia-contenedor.active { display: block; }

        .dia-header { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--primary); text-transform: uppercase; }

        /* Contenedor del título de etapa con botón de imagen */
        .etapa-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--color-abs);
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 10px;
            padding-right: 8px;
        }

        .etapa-header {
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-ver-guia {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }

        .etapa-piernas { background: var(--color-piernas); margin-top: 15px; margin-bottom: 10px; border-radius: 8px; display: block; }
        .etapa-foco { background: var(--color-especifico); margin-top: 15px; margin-bottom: 10px; border-radius: 8px; display: block; }

        .ejercicio {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .bloque-abs .ejercicio { border-left: 4px solid var(--color-abs); }
        .bloque-piernas .ejercicio { border-left: 4px solid var(--color-piernas); }
        .bloque-foco .ejercicio { border-left: 4px solid var(--color-especifico); }

        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--primary); }

        .info { flex-grow: 1; }
        .nom { font-weight: bold; font-size: 1rem; display: block; color: #fff; }
        .det { color: #888; font-size: 0.85rem; }

        .input-peso {
            background: #333; border: 1px solid #444; color: #ffdd57;
            font-weight: bold; width: 55px; text-align: center;
            border-radius: 5px; padding: 4px; font-size: 0.9rem;
        }

        /* MODAL PARA LA IMAGEN */
        #modal-guia {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #modal-guia img {
            max-width: 95%;
            max-height: 80%;
            border: 2px solid var(--primary);
            border-radius: 10px;
        }

        .btn-cerrar-modal {
            position: absolute;
            top: 30px;
            right: 20px;
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }

        #clock-box {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); background: #1a1a1a;
            padding: 10px 30px; border-radius: 40px;
            border: 2px solid var(--primary); z-index: 1000;
        }

        #clock-display { font-family: monospace; font-size: 1.8rem; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🏋️ MI RUTINA PRO</h1>
    </div>

    <div class="selector-dias">
        <button class="tab-btn active" onclick="abrirDia('lunes', this)">LUN</button>
        <button class="tab-btn" onclick="abrirDia('miercoles', this)">MIE</button>
        <button class="tab-btn" onclick="abrirDia('viernes', this)">VIE</button>
    </div>

    <div id="lunes" class="dia-contenedor active">
        <div class="dia-header">Piernas + Espalda</div>
        <div class="bloque-abs">
            <div class="etapa-wrapper">
                <span class="etapa-header">Etapa 1: Abdominales</span>
                <button class="btn-ver-guia" onclick="abrirImagen()">🖼️ VER GUÍA</button>
            </div>
            <div class="ejercicio"><input type="checkbox" id="c1" onchange="saveCheck(this)"><div class="info"><span class="nom">Crunch Abdominal</span><div class="det">3 x 20</div></div></div>
            <div class="ejercicio"><input type="checkbox" id="c2" onchange="saveCheck(this)"><div class="info"><span class="nom">Plancha</span><div class="det">3 x 45s</div></div></div>
        </div>
        </div>

    <div id="modal-guia" onclick="cerrarImagen()">
        <button class="btn-cerrar-modal">CERRAR</button>
        <img src="tu_imagen_aqui.jpg" id="img-referencia" alt="Guía Abdominales">
    </div>

    <div id="clock-box"><div id="clock-display">00:00:00</div></div>

    <script>
        // Función para abrir la imagen
        function abrirImagen() {
            // Reemplaza "tu_imagen_aqui.jpg" con el nombre real de tu archivo
            document.getElementById('img-referencia').src = "image_59224b.jpg"; 
            document.getElementById('modal-guia').style.display = 'flex';
        }

        function cerrarImagen() {
            document.getElementById('modal-guia').style.display = 'none';
        }

        function updateClock() {
            document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('es-AR', {hour12:false});
        }
        setInterval(updateClock, 1000); updateClock();

        function savePeso(el) { localStorage.setItem(el.id, el.value); }
        function saveCheck(el) { localStorage.setItem(el.id, el.checked); }

        function load() {
            document.querySelectorAll('.input-peso').forEach(i => {
                const s = localStorage.getItem(i.id); if (s) i.value = s;
            });
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                const s = localStorage.getItem(c.id); if (s) c.checked = (s === 'true');
            });
        }

        function abrirDia(diaId, btn) {
            document.querySelectorAll('.dia-contenedor').forEach(cont => cont.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(diaId).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = load;
    </script>
</body>
</html>
